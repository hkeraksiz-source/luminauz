<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="icon"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSJ3jnW290QBBuk7rr39CDuRIdTWPHduIlgow&s">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <title>Lumina — Ro'yxatdan o'tish</title>
</head>

<body>

    <!-- Animated floating background elements -->
    <div class="bg-particles">
        <div class="particle particle-1"><i class="fa-solid fa-book"></i></div>
        <div class="particle particle-2"><i class="fa-solid fa-book-open"></i></div>
        <div class="particle particle-3"><i class="fa-solid fa-bookmark"></i></div>
        <div class="particle particle-4"><i class="fa-solid fa-feather"></i></div>
        <div class="particle particle-5"><i class="fa-solid fa-star"></i></div>
        <div class="particle particle-6"><i class="fa-solid fa-graduation-cap"></i></div>
        <div class="particle particle-7"><i class="fa-solid fa-lightbulb"></i></div>
        <div class="particle particle-8"><i class="fa-solid fa-book-bookmark"></i></div>
        <div class="particle particle-9"><i class="fa-solid fa-pen-nib"></i></div>
        <div class="particle particle-10"><i class="fa-solid fa-scroll"></i></div>
        <div class="particle particle-11"><i class="fa-solid fa-glasses"></i></div>
        <div class="particle particle-12"><i class="fa-solid fa-book-open-reader"></i></div>
    </div>

    <!-- Glowing orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main register container -->
    <div class="login-wrapper">

        <!-- Left side - branding -->
        <div class="login-brand">
            <div class="brand-content">
                <div class="brand-icon">
                    <i class="fa-solid fa-book-bookmark"></i>
                </div>
                <h1 class="brand-title">Lumina</h1>
                <p class="brand-subtitle">KELAJAK KUTUBXONASI</p>
                <div class="brand-divider"></div>
                <p class="brand-desc">Bepul ro'yxatdan o'ting va<br>minglab kitoblardan<br>bahramand bo'ling!</p>

                <div class="brand-stats">
                    <div class="stat">
                        <span class="stat-number">5000+</span>
                        <span class="stat-label">Kitoblar</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-number">150+</span>
                        <span class="stat-label">Kunlik</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-number">10K+</span>
                        <span class="stat-label">O'quvchilar</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right side - register form -->
        <div class="login-form-side">
            <div class="form-container">
                <div class="form-header">
                    <h2 class="form-title">Ro'yxatdan o'tish</h2>
                    <p class="form-subtitle">Hisobingizni yarating va bilimlar olamiga qo'shiling</p>
                </div>

                <form id="registerForm" class="login-form">
                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <input type="text" id="name" placeholder="Ismingiz" required autocomplete="name">
                        <div class="input-line"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input type="email" id="email" placeholder="Email manzilingiz" required autocomplete="email">
                        <div class="input-line"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="password" placeholder="Parol (kamida 6 ta belgi)" required
                            autocomplete="new-password">
                        <div class="input-line"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                        <input type="password" id="confirm-password" placeholder="Parolni tasdiqlang" required
                            autocomplete="new-password">
                        <div class="input-line"></div>
                    </div>

                    <button type="submit" class="login-btn register-btn">
                        <span>RO'YXATDAN O'TISH</span>
                        <i class="fa-solid fa-user-plus"></i>
                    </button>
                </form>

                <div class="divider">
                    <span>yoki</span>
                </div>

                <div class="social-login">
                    <a href="#" class="social-btn google">
                        <i class="fa-brands fa-google"></i>
                    </a>
                    <a href="#" class="social-btn telegram">
                        <i class="fa-brands fa-telegram"></i>
                    </a>
                    <a href="#" class="social-btn github">
                        <i class="fa-brands fa-github"></i>
                    </a>
                </div>

                <p class="signup-link">
                    Allaqachon hisobingiz bormi? <a href="login.html">Kirish</a>
                </p>

                <a href="luminauz.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Asosiy sahifaga qaytish
                </a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
